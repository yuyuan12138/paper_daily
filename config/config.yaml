query:
  keywords: ["large language model", "computational psychology", "standarized patient"]
  categories: []
  max_results: 3 
  sort_by: submittedDate
  sort_order: descending

pipeline:
  download_pdf: true
  parse_pdf: true
  summarize: true
  output_markdown: true
  language: zh
  summary_level: standard
  # Multi-step analysis (optional) - enable for detailed multi-step analysis
  multi_step_enabled: true  # Set to true to enable multi-step analysis
  # Available steps: screening, quick, deep, experiments, reproducibility, inspiration
  multi_step_steps:
    - screening
    - quick
    - deep
    - experiments

model:
  provider: deepseek
  base_url: "https://api.deepseek.com/v1"
  model_name: "deepseek-chat"
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.2
  max_tokens: 4000
  max_concurrency: 5  # Max concurrent API calls for summarization

output:
  base_dir: ./data
  overwrite: false

runtime:
  retry_times: 3
  timeout_sec: 60
  dry_run: false
  continue_on_error: true
