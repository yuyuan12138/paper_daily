query:
  keywords: ["large language model"]
  categories: []
  max_results: 10
  sort_by: submittedDate
  sort_order: descending

pipeline:
  download_pdf: true
  parse_pdf: true
  summarize: true
  output_markdown: true
  language: zh
  summary_level: standard
  # Multi-step analysis (optional) - enable for detailed multi-step analysis
  multi_step_enabled: true  # Set to true to enable multi-step analysis
  # Available steps: screening, quick, deep, experiments, reproducibility, inspiration
  multi_step_steps:
    - screening
    - quick
    - deep
    - experiments

vision:
  enabled: true
  extractor: pdffigures2  # Options: "pymupdf" or "pdffigures2"

  # PyMuPDF extractor options (when extractor: pymupdf)
  extraction:
    min_size: [100, 100]
    max_aspect_ratio: 5.0
    max_images_per_paper: 15
    skip_duplicates: true

  # PDFFigures2 extractor options (when extractor: pdffigures2)
  # REQUIRED: Update this path to your compiled pdffigures2 JAR file
  # Compile with: cd pdffigures2 && sbt assembly
  pdffigures2_jar: "/home/yuyuan/paper_daily/pdffigures2/pdffigures2.jar"
  pdffigures2_dpi: 150
  pdffigures2_extract_figures: true
  pdffigures2_extract_tables: true
  pdffigures2_max_figures: 20
  pdffigures2_java_options:
    - "-Xmx2g"
    - "-Dsun.java2d.cmm=sun.java2d.cmm.kcms.KcmsServiceProvider"

  storage:
    output_dir: ./data/images
    format: png

  # Image analysis using multimodal LLM (siliconflow)
  analysis:
    enabled: false  # Set to true to enable image analysis (⚠️ in development, may produce inconsistent results)
    provider: "openai-compatible"
    model_name: "Qwen/Qwen3-VL-30B-A3B-Instruct"
    api_key_env: "SILICONFLOW_API_KEY"
    base_url: "https://api.siliconflow.cn/v1"
    max_tokens: 2000
    batch_size: 5
    max_concurrency: 5  # Max concurrent API calls for image analysis

model:
  provider: deepseek
  base_url: "https://api.deepseek.com/v1"
  model_name: "deepseek-chat"
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.2
  max_tokens: 4000
  max_concurrency: 5  # Max concurrent API calls for summarization

output:
  base_dir: ./data
  overwrite: false

runtime:
  retry_times: 3
  timeout_sec: 60
  dry_run: false
  continue_on_error: true
