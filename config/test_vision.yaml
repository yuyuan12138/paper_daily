query:
  keywords:
    - "large language model"
  max_results: 1

pipeline:
  language: zh
  summary_level: standard

vision:
  enabled: true
  extraction:
    min_size: [100, 100]
    max_aspect_ratio: 5.0
    max_images_per_paper: 15
    skip_duplicates: true
  analysis: null

model:
  provider: deepseek
  base_url: "https://api.deepseek.com/v1"
  model_name: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.2
  max_tokens: 2000

output:
  base_dir: ./data

runtime:
  retry_times: 2
  timeout_sec: 60
  dry_run: false
