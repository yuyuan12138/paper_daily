query:
  keywords:
    - "large language model"
  max_results: 1

pipeline:
  language: zh
  summary_level: standard

vision:
  enabled: true
  extraction:
    min_size: [200, 200]
    max_aspect_ratio: 3.0
    max_images_per_paper: 5
    skip_duplicates: true
  analysis:
    provider: openai
    model_name: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    batch_size: 2
    max_tokens: 500

model:
  provider: deepseek
  model_name: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.2
  max_tokens: 2000

output:
  base_dir: ./data

runtime:
  retry_times: 2
  timeout_sec: 60
  dry_run: false
